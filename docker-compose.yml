version: '3.8'

services:
  gavvy-salesmaster:
    build: .
    container_name: gavvy-salesmaster
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:////app/data/tianlong_sales.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # 可选：添加 Nginx 反向代理（生产环境推荐）
  nginx:
    image: nginx:alpine
    container_name: gavvy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - gavvy-salesmaster
    restart: unless-stopped
