name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install build deps
      run: pip install "setuptools>=64" build cython
    - name: Build (compile to .so)
      run: python build_release.py
    - name: Install
      run: pip install -e .
    - name: Test
      run: python -m pytest tests/ -q --tb=short
